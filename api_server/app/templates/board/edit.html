{% extends "base.html" %}

{% block title %}게시글 수정{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/board.css') }}">
{% endblock %}

{% block content %}
<div class="page-wrapper board-form-page">
  <section class="board-form-section">
    <div class="board-form-container">

      <!-- 상단 -->
      <div class="board-form-topbar">
        <a href="{{ url_for('board.board_detail', post_id=post.id) }}" class="board-back-link">← 게시글 상세로 돌아가기</a>
      </div>

      <!-- 수정 카드 -->
      <div class="board-form-card">
        <div class="board-form-head">
          <span class="board-page-badge">EDIT POST</span>
          <h1>게시글 수정</h1>
          <p>작성한 내용을 수정할 수 있습니다.</p>
        </div>

        <form method="POST" action="{{ url_for('board.board_edit', post_id=post.id) }}" class="board-write-form">
          <div class="board-form-group">
            <label for="title">제목</label>
            <input
              type="text"
              id="title"
              name="title"
              class="board-form-input"
              value="{{ post.title }}"
              placeholder="제목을 입력해주세요."
              maxlength="200"
              required
            >
          </div>

          <div class="board-form-group">
            <label for="content">내용</label>
            <textarea
              id="content"
              name="content"
              class="board-form-textarea"
              rows="14"
              placeholder="내용을 입력해주세요."
              required
            >{{ post.content }}</textarea>
          </div>

          <div class="board-form-actions">
            <a href="{{ url_for('board.board_detail', post_id=post.id) }}" class="btn btn-outline">취소</a>
            <button type="submit" class="btn btn-primary">수정 완료</button>
          </div>
        </form>
      </div>

    </div>
  </section>
</div>
{% endblock %}
